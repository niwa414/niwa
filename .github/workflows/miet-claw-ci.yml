name: MIET-Claw CI

on:
  push:
    paths:
      - 'miet-claw/**'
      - '.github/workflows/miet-claw-ci.yml'
  pull_request:
    paths:
      - 'miet-claw/**'
      - '.github/workflows/miet-claw-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miet-claw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: PYTHONPATH=src python3 -m unittest discover -s tests -v
      - run: npm run test:plugin
      - run: npm run build:web
      - run: PYTHONPATH=src python3 -m miet_claw.runtime.router_eval --golden examples/evals/router_golden.json
      - run: PYTHONPATH=src python3 -m miet_claw.runtime.runtime_eval --golden examples/evals/runtime_health_golden.json
