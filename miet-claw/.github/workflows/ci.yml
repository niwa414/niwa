name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: PYTHONPATH=src python3 -m unittest discover -s tests -v
      - run: npm run test:plugin
      - run: npm run build:web
      - run: PYTHONPATH=src python3 -m miet_claw.cli router-golden-eval --golden-file examples/evals/router_golden.json --output-dir /tmp/miet-router-eval
      - run: PYTHONPATH=src python3 -m miet_claw.cli runtime-golden-eval --golden-file examples/evals/runtime_health_golden.json
