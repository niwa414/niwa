# Explicit mapping from checklist items to case IDs.

A1:
  title: Hall-MHD baseline (GEM)
  coverage: full
  primary_cases:
    - m14-a1-hall-compare-res-low
    - m14-a1-hall-compare-res-mid
    - m14-a1-hall-compare-res-high
  supplemental_cases:
    - m10-a1-hall-compare
  rationale_override: "Resolution sweep (96x48, 128x64, 192x96) keeps peak_time stable (2.000186-2.000885) and divB_rel improves with resolution (8.92e-4 -> 4.51e-4 -> 1.83e-4); energy drift remains 0. Peak_value is resolution-sensitive (non-monotonic), so interpretation should be paired with hall-off compare rather than treated as strictly converged. Differential Hall-on/off metrics (delta_peak_value, ratio_peak_value) remain stable across resolutions (ratio ~1.016-1.046), reducing sensitivity to absolute peak amplitude."

A2:
  title: Merging / compression chain
  coverage: full
  primary_cases:
    - m13-a2-formation-translation-nonfast-lite
  supplemental_cases:
    - m5-a2-formation-translation-gate
  rationale_override: "Non-fast lite run: tlim=6.0, output1 dt=0.25, v_inflow=0.1, v_bulk=0.24; psi_closed_persist_outputs=24; formation_time_frac~0.04167; centroid_shift_abs~0.05437; wall_time_s~354s; archive_size_gb~0.0048. Fast gate retained as supplemental."

A3:
  title: Dynamic circuit-plasma closed-loop
  coverage: full
  primary_cases:
    - m26-a3-closed-loop-full-gate
  supplemental_cases:
    - m5-a3-closed-loop-strong
    - m16-a3-circuit-radius-response
    - m4-a3-closed-loop-circuit-gate
    - m26-p2-circuit-load-integration
  rationale_override: "A3 is promoted to a full integration gate by combining strong per-step coupling, explicit response-sensitivity evidence, and integrated circuit-load/recapture checks in one PASS artifact."

A3.1:
  title: Closed-loop response sensitivity (radius proxy)
  coverage: partial
  primary_cases:
    - m16-a3-circuit-radius-response
  rationale_override: "Driver response is observed under a +30% LCR drive perturbation (B_est increases, driver_response_ratio >= 1.1). Known gap: radius response is not observed in the current window (radius_rms_range_ratio and r_proxy_b_rms_range_ratio ~1.0); requires follow-up on a plasma-coupled response signal or longer/stronger physical response window."

A4:
  title: Cut-cell / embedded boundary geometry
  coverage: full
  primary_cases:
    - m26-a4-conductor-load-gate
  supplemental_cases:
