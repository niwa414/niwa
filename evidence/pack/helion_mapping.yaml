P20:
  title: Control Law (DOE5 @ off_step=352)
  coverage: partial
  primary_cases:
    - m17-b2-p19-off352-drive050-repeat064
    - m17-b2-p19-off352-drive050-repeat512
    - m17-b2-p19-off352-drive200-repeat064
    - m17-b2-p19-off352-drive200-repeat512
    - m17-b2-p20-off352-drive100-repeat256
  control_law:
    source: outputs/p20-control-law/analysis/metrics_p20_control_law.json
    sha1: 34ea985978961947669d80d7505720d6d9651ae7
    circuit:
      formula: "log(e_load) = a + b*log(driveAmp)"
      a: 1.9295279007
      b_driveAmp: 1.9999997719
      r2: 0.999999999999997
    tail:
      formula: "log(u2_p99_at_stepOff) = a + b*log(repeat) + c*log(driveAmp)"
      a: 28.6221406185
      b_repeat: 0.3138287523
      c_driveAmp: 0.0139256233
      r2: 0.9807255186
    phase_compression:
      formula: "log(rho_delta_rel_phase) = a + b*log(repeat)"
      a: -16.3133110261
      b_repeat: 2.5860374985
      r2: 0.9617025590
  rationale_override: "DOE5 fit at off_step=352 yields near-perfect circuit scaling (e_load ∝ driveAmp^2), weak tail dependence on driveAmp and modest power-law on repeat (u2_p99 ∝ repeat^0.314), and strong phase compression scaling with repeat (rho_delta_rel_phase ∝ repeat^2.586)."

