    - m6-a4-eb-wall-step
    - m22-a4-eb-movingwall-stage2-tight
    - m26-d2-magnetic-load-interface
  rationale_override: "A4 now gates baseline EB wall blocking, moving-wall response, and engineering load handoff artifacts together, upgrading from geometry-only gate coverage to conductor/load interface readiness."

A4.2:
  title: EB + moving-wall short window
  coverage: partial
  primary_cases:
    - m15-a4-eb-movingwall-short
  rationale_override: "EB mask active (blocked_faces>0) + moving-wall driven (piston_metric>0) + stable completion at short window (tlim=1.4). Tuned wall profile (cyl_wall_r1=0.77) reduces geom-weighted blocked-flux residual to mass_budget_residual_geom_rel ~1.7e-3 and passes tightened layer2 gate (<=2e-3) with leak_mass_frac_max<=1e-2. Known gap: residual remains non-zero; follow-up is cut-cell/moving-wall flux closure."

